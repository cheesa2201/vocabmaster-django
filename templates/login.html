{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load i18n %}
{% block title %}Đăng nhập · VocabMaster{% endblock %}
{% block page_title %}Đăng nhập{% endblock %}
{% block content %}
<div class="row justify-content-center mt-2"><div class="col-md-5 col-lg-4">
<div class="vm-card">
    <div style="text-align:center;margin-bottom:24px;">
        <div style="font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent);">VocabMaster</div>
        <div style="font-size:.8rem;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;">Welcome back</div>
    </div>
    <form method="post" action="{% url 'account_login' %}">{% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="vm-btn vm-btn-primary w-100 mt-2" style="justify-content:center;padding:12px;">Đăng nhập</button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:.85rem;color:var(--muted);">
        Chưa có tài khoản? <a href="{% url 'account_signup' %}" style="color:var(--accent);">Đăng ký ngay</a>
    </div>
</div>
</div></div>
{% endblock %}
